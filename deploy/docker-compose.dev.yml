# Development overrides for docker-compose.yml
# Usage: docker compose -f deploy/docker-compose.yml -f deploy/docker-compose.dev.yml up

services:
  db:
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

  server:
    build:
      context: ../server
      dockerfile: Dockerfile
      target: builder
    ports:
      # Bind to loopback only — the boot-safety check refuses to start on a
      # non-loopback bind when the JWT secret is the well-known dev default.
      - "127.0.0.1:8000:8000"
    volumes:
      - ../server:/app
      - /app/.venv
    environment:
      OSA_DATABASE__URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-osa}@db:5432/${POSTGRES_DB:-osa}
      OSA_DATA_DIR: /data
      OSA_CONFIG_FILE: /app/osa.yaml
      OSA_BASE_URL: http://localhost:8000
      OSA_LOGGING__LEVEL: ${LOG_LEVEL:-DEBUG}
      OSA_DEV_MODE: "true"
      WATCHFILES_FORCE_POLLING: "true"
    entrypoint: []
    command: ["/app/scripts/entrypoint.sh"]
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8000/api/v1/health"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 3

  web:
    build:
      context: ../web
      dockerfile: Dockerfile
      target: deps
    volumes:
      - ../web:/app
      - /app/node_modules
      - /app/.next
    environment:
      API_URL: http://server:8000
    ports:
      - "3000:3000"
    entrypoint: []
    command: ["pnpm", "dev"]
