# Settings file for pnpm. In pnpm 11+ this is the canonical location for
# what used to live under the `pnpm` field in package.json.

# Allow these packages to run install/postinstall scripts. They all do the same
# thing — verify the right per-platform native binary is present and, if not,
# fetch it from the npm registry. See the discussion in the PR for details.
onlyBuiltDependencies:
  - esbuild
  - sharp
  - unrs-resolver
